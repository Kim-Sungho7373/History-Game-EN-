                image: 'Image/ch4book.jpg',
                effect: { action: 'START_STEALTH' },
                next: null
            },
            'CH4_LIB_SUCCESS': {
                id: 'CH4_LIB_SUCCESS',
                type: 'NARRATION',
                text: "[Success] You perfectly deceived the eyes of the guards.\nYou secured the 'Rekidai Hoan' containing the history of Ryukyu deep within the archives.\n(🟦 Identity greatly increased)",
                image: 'Image/booksuccess.jpg',
                effect: { action: 'GAIN_STAT', int: 40, items: ['Original Rekidai Hoan'], completeMission: 'ch4_library' },
                next: null
            },
            'CH4_LIB_FAIL': {
                id: 'CH4_LIB_FAIL',
                type: 'CHOICE',
                text: "[Failed] \"Who goes there!\"\nYou were spotted! You fled in a hurry but must try again.",
                image: 'Image/bookfail.jpg',
                choices: [
                    { text: "Infiltrate again (Retry)", type: 'INT', diff: 0, success: 'CH4_LIBRARY' },
                    { text: "Give up (Mission Fail)", type: 'WAR', diff: 0, success: 'CH4_LIB_GIVEUP' }
                ]
            },
            'CH4_LIB_GIVEUP': {
                id: 'CH4_LIB_GIVEUP',
                type: 'NARRATION',
                text: "The security was too tight to approach...\n(Identity decreased)",
                effect: { action: 'FAIL_EVENT', int: -20, completeMission: 'ch4_library' },
                next: null
            },



            'CH4_BLOODLINE': {
                id: 'CH4_BLOODLINE', type: 'CHOICE', text: "You must evacuate the young grandson of King Sho Tai. The checkpoints are heavily guarded.", image: 'Image/ch4prince.jpg', choices: [
                    { text: "[Bribe] Use funds to bribe them. (Funds -30)", type: 'MONEY', cost: 30, success: 'CH4_BLOOD_BRIBE', fail: 'CH4_BLOOD_FAIL' },
                    { text: "[Act] Disguise as a patient with an infectious disease.", type: 'CHA', diff: 60, success: 'CH4_BLOOD_ACT', fail: 'CH4_BLOOD_FAIL' }
                ]
            },
            'CH4_BLOOD_BRIBE': { id: 'CH4_BLOOD_BRIBE', type: 'NARRATION', text: "The guard who received the money turned a blind eye. The royal grandson is safe.", image: 'Image/ch4prince3.jpg', effect: { action: 'GAIN_STAT', cha: 20, completeMission: 'ch4_bloodline' }, next: null },
            'CH4_BLOOD_ACT': { id: 'CH4_BLOOD_ACT', type: 'NARRATION', text: "The guards were terrified by the sick act and cleared the way. Your wits shined!", image: 'Image/ch4prince2.jpg', effect: { action: 'GAIN_STAT', cha: 40, completeMission: 'ch4_bloodline' }, next: null },
            'CH4_BLOOD_FAIL': { id: 'CH4_BLOOD_FAIL', type: 'NARRATION', text: "Discovered! The royal grandson was detained, and you were beaten.", image: 'Image/ch4prince4.jpg', effect: { action: 'FAIL_EVENT', morale: -30, war: -10, completeMission: 'ch4_bloodline' }, next: null },

            'CH4_KARATE': {
                id: 'CH4_KARATE', type: 'CHOICE', text: "Matsumura, the martial artist, has arrived.\n\"I will buy time to protect your records.\"", image: 'Image/karate.jpg', choices: [
                    { text: "[Form] Organize a guard corps.", type: 'WAR', diff: 0, success: 'CH4_KARATE_YES', fail: 'CH4_KARATE_YES' },
                    { text: "[Refuse] Do not want any sacrifices.", type: 'INT', diff: 0, success: 'CH4_KARATE_NO', fail: 'CH4_KARATE_NO' }
                ]
            },
            'CH4_KARATE_YES': { id: 'CH4_KARATE_YES', type: 'NARRATION', text: "The fists of Ryukyu have gathered. They will face guns and swords with bare hands.", image: 'Image/karateyes.jpg', effect: { action: 'GAIN_STAT', war: 50, completeMission: 'ch4_karate' }, next: null },
            'CH4_KARATE_NO': { id: 'CH4_KARATE_NO', type: 'NARRATION', text: "You sent them back. Now it is a fight of your own.", image: 'Image/karateno.jpg', effect: { action: 'GAIN_STAT', int: 10, completeMission: 'ch4_karate' }, next: null },

            // Ch5: Sunset of Shuri
            'FINAL_INVASION': {
                id: 'FINAL_INVASION',
                type: 'NARRATION',
                text: "March 27, 1879.\n\nThe sound of 600 Japanese soldiers' military boots echoes between the red pillars of Shuri Castle.\n\n\"Escort the King! We abolish the Ryukyu Domain and establish Okinawa Prefecture!\"\n\nDisposition Officer Matsuda's voice pierces like a dagger.",
                image: 'Video/final.mp4',
                next: 'FINAL_KING_AUDIENCE'
            },
            'FINAL_KING_AUDIENCE': {
                id: 'FINAL_KING_AUDIENCE',
                type: 'DIALOG',
                npc: 'King Sho Tai',
                text: "(Rising weakly from the throne)\n\n\"Majikina... The land will be taken. The palace will lose its master.\nBut... we cannot hand over the 500-year soul of Ryukyu to them.\n\nWhat will you protect at the very end?\"",
                image: 'Video/finalking.mp4',
                next: 'FINAL_CHOICE'
            },
            'FINAL_CHOICE': {
                id: 'FINAL_CHOICE',
                type: 'CHOICE',
                text: "At the King's question, you tightly grip what you have hidden in your chest.",
                image: 'Image/finalchoice.jpg',
                choices: [
                    {
                        text: "[TRUE] \"Though the nation disappears, the song remains.\" (Distribute Bingata/Score)",
                        condition: (p) => p.stats.int >= 80 && (p.inventory.includes("Bingata Design") || p.inventory.includes("Red Hanagasa") || p.inventory.includes('Old Sanshin Score')),
                        failText: "(Requirement: Identity 80+, Possess Cultural Heritage)",
                        success: 'ENDING_SEQ_TRUE',
                        fail: 'FINAL_BAD_FORCE'
                    },
                    {
                        text: "[NORMAL] \"I will protect the safety of the royal family and my clan.\" (Negotiation and compliance)",
                        condition: (p) => p.stats.war >= 70 && p.inventory.includes("Japanese Pocket Watch"),
                        failText: "(Requirement: Japan Relations 70+, Pocket Watch)",
                        success: 'ENDING_SEQ_NORMAL',
                        fail: 'FINAL_BAD_FORCE'
                    },
                    {
                        text: "[SAD] \"We must plan for the future. Let us go to Qing.\" (Attempt exile)",
                        condition: (p) => p.stats.cha >= 80 && (p.inventory.includes("Old Map") || p.inventory.includes("Hidden Royal Seal")),
                        failText: "(Requirement: Qing Relations 80+, Map/Seal)",
                        success: 'ENDING_SEQ_SAD',
                        fail: 'FINAL_BAD_FORCE'
                    },
                    {
                        text: "[BAD] \"We cannot end it like this! Fight to the death!\" (Reckless charge)",
                        success: 'ENDING_SEQ_BAD',
                        fail: 'ENDING_SEQ_BAD'
                    }
                ]
            },

            // --- ENDING SEQUENCES ---
            'ENDING_SEQ_TRUE': {
                id: 'ENDING_SEQ_TRUE', type: 'NARRATION',
                text: "Taking advantage of the chaos as the Japanese army escorts the King away, you threw the [Bingata Design] and [Sanshin Score] over the wall.\n\n\"Take this! This is our soul! Do not forget!\"\n\nNumerous people pick them up, hold them to their chests, and scatter.\nThough Shuri Castle falls today, the song passed from mouth to mouth will be eternal.",
                image: 'Image/happyending.jpg',
                effect: { action: 'GAME_CLEAR', endingType: 'TRUE' }, next: null
            },
            'ENDING_SEQ_NORMAL': {
                id: 'ENDING_SEQ_NORMAL', type: 'NARRATION',
                text: "You took out the [Japanese Pocket Watch], showed it to Disposition Officer Matsuda, and bowed your head.\n\n\"A wise judgment. Your family will receive the title of 'Baron'.\"\n\nThe king was taken to Tokyo, and you obtained a safe mansion.\nHowever, the person reflected in the mirror... was an unfamiliar stranger in Japanese clothes.",
                image: 'Image/normalending.jpg',
                effect: { action: 'GAME_CLEAR', endingType: 'NORMAL' }, next: null
            },
            'ENDING_SEQ_SAD': {
                id: 'ENDING_SEQ_SAD', type: 'NARRATION',
                text: "Under the cover of darkness, you boarded an old wooden boat.\nYou braved the rough waves and arrived in Qing, but...\n\n\"Ryukyu? Why should we help a nation that has already perished?\"\n\nNo one opened the door. On a cold foreign street, you close your eyes, looking at the fading lights of your homeland.",
                image: 'Image/sadending.jpg',
                effect: { action: 'GAME_CLEAR', endingType: 'SAD' }, next: null
            },
            'ENDING_SEQ_BAD': {
                id: 'ENDING_SEQ_BAD', type: 'NARRATION',
                text: "\"You scoundrels!! How dare you step on Ryukyu soil!!\"\n\nYou drew your hidden sword and charged at Matsuda.\n\n(Bang! Ba-bang!)\n\nAlong with the cold smell of gunpowder, your vision turns red.\nIn your fallen eyes, the burning Shuri Castle is reflected for the last time.",
                image: 'Image/badending.jpg',
                effect: { action: 'GAME_OVER', endingType: 'BAD' }, next: null
            },
            'FINAL_BAD_FORCE': {
                id: 'FINAL_BAD_FORCE', type: 'NARRATION',
                text: "You tried to do something... but nothing was prepared.\nWhile you were panicking, the Japanese army surrounded you.\n\n\"Drag him out.\"",
                image: 'Image/badforce.jpg',
                effect: { action: 'GAME_OVER', endingType: 'BAD' }, next: null
            }
        };

        // --- ITEM DATA ---
        const ITEM_DB = {
            'Bingata Design': { icon: '🌺', image: 'Image/realbingata.png', type: 'Cultural Heritage', desc: 'The Bingata design of the Ryukyu royal family.\nIt is the color of the nation that will not fade despite any trials.' },
            'Red Hanagasa': { icon: '👒', image: 'Image/redhat.png', type: 'Cultural Heritage', desc: 'A red conical hat used in traditional dance.\nWhen dancing with this, hearts connect without speaking.' },
            'Japanese Pocket Watch': { icon: '🕰️', image: 'Image/watch.png', type: 'Valuable', desc: 'A symbol of modernization that tells time accurately.\nHowever, the ticking sound somehow feels cold.' },
            'Old Map': { icon: '🗺️', image: 'Image/map.png', type: 'Key Item', desc: 'A map showing the secret sea route to Qing.\nIt is stained with seawater and tears.' },
            'Hidden Royal Seal': { icon: '💠', image: 'Image/hiden.png', type: 'National Treasure', desc: 'The seal of the King of Ryukyu.\nBuried deep in the ground, waiting for the day it sees light again.' },
            'Record of Truth': { icon: '📜', image: 'Image/realimportant.png', type: 'Document', desc: 'A document recording the tragedy of the Taiwanese castaways incident.\nIt is the only weapon against false pretexts.' },
            'Dual Nationality Certificate': { icon: '⚖️', image: 'Image/2.png', type: 'Document', desc: 'A document obtained by walking a tightrope between Qing and Japan.\nA product of desperate diplomacy for survival.' },
            'Old Sanshin Score': { icon: '🎸', image: 'Image/music.png', type: 'Cultural Heritage', desc: 'A score with the forgotten old songs of Ryukyu.\nEven as time passes, this melody will remain.' },
            'Original Rekidai Hoan': { icon: '📚', image: 'Image/historybook.png', type: 'National Treasure', desc: 'A top-secret document containing the history of Ryukyu diplomacy.\nIt is the evidence proving we were an independent nation.' },
            'Japanese Official Uniform': { icon: '👘', image: 'Image/japanst.png', type: 'Clothing', desc: 'Clothes worn by Japanese nobles.\nIt fits the body, but not the heart.' },
            'Humiliating Treaty': { icon: '📜', image: '', type: 'Document', desc: 'A treaty yielding sovereignty.' },
            'Broken Royal Seal Piece': { icon: '💠', image: '', type: 'Fragment', desc: 'A broken piece of the royal seal.' },
            'Qing Jade Pendant': { icon: '📿', image: '', type: 'Valuable', desc: 'A jade pendant representing goodwill from Qing.' },
            'Intangible Cultural Asset Certificate': { icon: '📄', image: '', type: 'Document', desc: 'A certificate recognizing cultural mastery.' },
            'default': { icon: '📦', color: 'from-gray-500 to-gray-700', type: 'Misc', desc: 'It is a normal item.' }
        };

        // --- MAIN APP ---
        const RyukyuGame = () => {
            const [phase, setPhase] = useState('TITLE');
            const [chapter, setChapter] = useState(1);
            const [turn, setTurn] = useState(1);
            const [maxAp, setMaxAp] = useState(3);
            const [currentAp, setCurrentAp] = useState(3);
            const [currentScene, setCurrentScene] = useState(null);
            const [logs, setLogs] = useState([]);
            const [isChapterCleared, setChapterCleared] = useState(false);
            const [completedMissions, setCompletedMissions] = useState(new Set());

            // Inventory UI State
            const [showInventory, setShowInventory] = useState(false);
            const [viewingItem, setViewingItem] = useState(null);

            const [endingType, setEndingType] = useState(null);

            const [player, setPlayer] = useState({
                name: 'Majikina',
                stats: { int: 50, war: 30, cha: 30 },
                funds: 50,
                morale: 80,
                inventory: [],
                traits: []
            });

            // --- DEBUG CHEAT MENU REMOVED ---

            // Sound Effect Logic
            const audioRef = useRef(new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg'));

            useEffect(() => {
                const handleGlobalClick = (e) => {
                    if (e.target.closest('button')) {
                        try {
                            const sound = audioRef.current.cloneNode(true);
                            sound.volume = 0.5;
                            sound.play().catch(err => console.log('Audio Autoplay Blocked:', err));
                        } catch (err) {
                            console.error('Audio Error:', err);
                        }
                    }
                };

                window.addEventListener('click', handleGlobalClick);
                return () => window.removeEventListener('click', handleGlobalClick);
            }, []);

            // Video Refs
            const videoRef = useRef(null);
            useEffect(() => {
                const tryPlay = async () => {
                    if (phase === 'TITLE' && videoRef.current) {
                        try {
                            await videoRef.current.play();
                            videoRef.current.muted = false;
                        } catch (e) {
                            videoRef.current.muted = true;
                            videoRef.current.play();
                        }
                    }
                };
                tryPlay();

                const unlockAudio = () => {
                    if (videoRef.current) {
                        videoRef.current.muted = false;
                        videoRef.current.play().catch(() => { });
                    }
                    window.removeEventListener('click', unlockAudio);
                    window.removeEventListener('touchstart', unlockAudio);
                    window.removeEventListener('keydown', unlockAudio);
                };

                window.addEventListener('click', unlockAudio);
                window.addEventListener('touchstart', unlockAudio);
                window.addEventListener('keydown', unlockAudio);

                return () => {
                    window.removeEventListener('click', unlockAudio);
                    window.removeEventListener('touchstart', unlockAudio);
                    window.removeEventListener('keydown', unlockAudio);
                };
            }, [phase]);

            const startScene = (sceneId) => {
                if (!SCENES[sceneId]) {
                    console.error(`❌ Error: Scene ID '${sceneId}' not found in SCENES object.`);
                    alert(`Error: Could not find scene data for '${sceneId}'. (Check Console)`);
                    return;
                }

                if (sceneId === 'CH4_BRANCH_POINT') {
                    if (player.stats.int >= 100) {
                        setCurrentScene(SCENES['CH4_AWAKENING']);
                    } else {
                        setCurrentScene(SCENES['CH4_LIBRARY']);
                    }
                    return;
                }

                setCurrentScene(SCENES[sceneId]);
                setPhase('SCENE');
            };

            const nextScene = (nextId) => {
                if (nextId === 'CH4_BRANCH_POINT') {
                    if (player.stats.int >= 100) setCurrentScene(SCENES['CH4_AWAKENING']);
                    else setCurrentScene(SCENES['CH4_LIBRARY']);
                    return;
                }

                if (!nextId) {
                    setPhase('GAME');
                    setCurrentScene(null);
                    return;
                }
                setCurrentScene(SCENES[nextId]);
            };

            const spendAp = (cost = 1) => {
                if (currentAp < cost) { alert("Not enough Action Points."); return false; }
                setCurrentAp(p => p - cost);
                return true;
            };

            const handleChoice = (choice) => {
                if (choice.condition) {
                    const context = { ...player, completedMissions };
                    if (!choice.condition(context)) {
                        alert(choice.failText || "Conditions not met.");
                        return;
                    }
                }

                if (choice.type === 'MONEY') {
                    if (player.funds < choice.cost) { alert("Not enough funds!"); return; }
                    setPlayer(p => ({ ...p, funds: p.funds - choice.cost }));
                    nextScene(choice.success);
                    return;
                }
                if (choice.diff > 0) {
                    const stat = player.stats[choice.type.toLowerCase()];
                    if (Math.random() * 100 < Math.min(95, 50 + (stat - choice.diff) * 2)) nextScene(choice.success);
                    else nextScene(choice.fail);
                } else {
                    nextScene(choice.success);
                }
            };

            const handleStealthComplete = (isSuccess) => {
                if (isSuccess) {
                    setPhase('SCENE');
                    nextScene('CH4_LIB_SUCCESS');
                } else {
                    setPhase('SCENE');
                    nextScene('CH4_LIB_FAIL');
                }
            };

            const handleEffect = (effect) => {
                if (!effect) return;

                if (effect.completeMission) {
                    setCompletedMissions(prev => new Set(prev).add(effect.completeMission));
                }

                if (effect.action === 'GAIN_STAT' || effect.action === 'FAIL_EVENT') {
                    const statCap = (player.traits && player.traits.includes('Blessing of Niraikanai')) ? 120 : 100;
                    setPlayer(p => ({
                        ...p,
                        stats: {
                            int: Math.min(statCap, Math.max(0, p.stats.int + (effect.int || 0))),
                            war: Math.min(statCap, Math.max(0, p.stats.war + (effect.war || 0))),
                            cha: Math.min(statCap, Math.max(0, p.stats.cha + (effect.cha || 0))),
                        },
                        funds: p.funds + (effect.funds || 0),
                        morale: Math.min(100, Math.max(0, p.morale + (effect.morale || 0))),
                        inventory: effect.items ? [...p.inventory, ...effect.items] : p.inventory,
                        traits: effect.traits ? [...(p.traits || []), ...effect.traits] : (p.traits || [])
                    }));
                    if (effect.items) setLogs(p => [`🎒 Obtained: ${effect.items.join(', ')}`, ...p]);
                }

                if (effect.action === 'UNLOCK_CHAPTER' || effect.unlockChapter) {
                    setChapterCleared(true);
                }

                if (effect.action === 'GAME_CLEAR') {
                    setEndingType(effect.endingType);
                    setPhase('ENDING');
                }
                else if (effect.action === 'GAME_OVER') {
                    setEndingType(effect.endingType);
                    setPhase('ENDING');
                    setLogs(p => [`💀 GAME OVER`, ...p]);
                }
                else if (effect.action === 'NEXT_CHAPTER' || effect.chapter) {
                    const nextChap = effect.chapter;
                    setChapter(nextChap);
                    setTurn(1);
                    setCurrentAp(maxAp);
                    setChapterCleared(false);
                    setLogs(p => [`📜 Chapter ${nextChap} Start`, ...p]);

                    if (nextChap === 2) startScene('CH2_START');
                    else {
                        setPhase('GAME');
                        setCurrentScene(null);
                    }
                }
                else if (effect.action === 'START_GAME') setPhase('GAME');
                else if (effect.action === 'START_RHYTHM') setPhase('RHYTHM');
                else if (effect.action === 'START_QUIZ') setPhase('QUIZ');
                else if (effect.action === 'START_DEBATE') setPhase('DEBATE');
                else if (effect.action === 'START_STEALTH') setPhase('STEALTH');
                else if (effect.action === 'GAME_CLEAR') {
                    setEndingType(effect.endingType);
                    setPhase('ENDING');
                }
                else if (effect.action === 'GAME_OVER') {
                    setEndingType('BAD');
                    setPhase('ENDING');
                }
            };

            const handleDebateComplete = (isWin) => {
                setPhase('SCENE');
                nextScene(isWin ? 'CH2_DEBATE_WIN' : 'CH2_DEBATE_LOSE');
            };

            const handleRhythmComplete = (rank, score) => {
                setLogs(p => [`🎵 Dance Result: Rank ${rank} (${score} points)`, ...p]);
                if (rank === 'P') setCurrentScene(SCENES['DANCE_P']);
                else if (rank === 'S') setCurrentScene(SCENES['DANCE_S']);
                else if (rank === 'B') setCurrentScene(SCENES['DANCE_B']);
                else setCurrentScene(SCENES['DANCE_F']);
                setPhase('SCENE');
            };

            const handleQuizComplete = (isCorrect) => {
                if (isCorrect) setCurrentScene(SCENES['BINGATA_CORRECT']);
                else setCurrentScene(SCENES['BINGATA_WRONG']);
                setPhase('SCENE');
            };

            const isCh1Ready = completedMissions.has('ch1_patrol') && completedMissions.has('ch1_market');
            const isCh2Ready = completedMissions.has('ch2_rescue') && completedMissions.has('ch2_debate') && completedMissions.has('ch2_info');
            const isCh3Ready = completedMissions.has('ch3_bingata') && completedMissions.has('ch3_dance') && completedMissions.has('ch3_hair');
            const isCh4Ready = completedMissions.has('ch4_library') && completedMissions.has('ch4_bloodline');

            const calculateScore = () => {
                let score = 0;
                score += player.inventory.length * 2000;
                score += player.stats.int * 50 + player.stats.war * 10 + player.stats.cha * 10;
                score += player.funds * 5;

                if (endingType === 'TRUE') score += 10000;
                else if (endingType === 'NORMAL') score += 5000;
                else if (endingType === 'SAD') score += 3000;
                else if (endingType === 'BAD' || endingType === 'HIDDEN') score += 4000;

                return score;
            };

            const getCollectorRank = () => {
                const count = player.inventory.length;
                if (count >= 5) return "Guardian of Ryukyu";
                if (count >= 3) return "Keeper of Memories";
                return "Wanderer";
            };

            return (
                <div className="w-full h-screen font-sans-kr text-slate-100 relative bg-black">
                    <GlobalStyles />

                    {/* DEBUG MENU OVERLAY REMOVED */}

                    {/* TITLE */}
                    {phase === 'TITLE' && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center p-4 text-center overflow-hidden">
                            <video ref={videoRef} src="Video/Intro.mp4" className="absolute inset-0 w-full h-full object-cover opacity-40" autoPlay loop muted playsInline />

                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black/80"></div>

                            <div className="relative z-10 animate-fade-in">
                                <h1 className="text-5xl md:text-7xl font-cinzel text-teal-400 mb-4 drop-shadow-2xl tracking-widest">RYUKYU</h1>
                                <p className="text-gray-400 font-myeongjo text-lg mb-12 tracking-widest">The Jade Memory</p>
                                <button onClick={() => startScene('START')} className="px-12 py-4 border-2 border-teal-500 text-teal-400 hover:bg-teal-500 hover:text-black transition-all duration-500 font-cinzel text-xl tracking-widest game-btn">
                                    ENTER MEMORY
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MAIN UI (GAME/SCENE) */}
                    {phase !== 'TITLE' && (
                        <div className="relative w-full h-full flex flex-col">
                            {/* Top Bar */}
                            <div className="fixed top-0 left-0 w-full bg-gradient-to-b from-black/90 to-transparent p-4 z-50 flex justify-between text-white border-b border-white/10">
                                <div className="flex items-center gap-4">
                                    <div className="font-bold text-lg text-teal-400 drop-shadow-md font-cinzel">{CHAPTERS[chapter].location}</div>
                                    <div className="text-sm text-gray-300">Day {turn}</div>
                                    <div className="flex gap-1">{[...Array(maxAp)].map((_, i) => <div key={i} className={`w-3 h-3 rounded-full border border-white/50 ${i < currentAp ? 'bg-teal-500' : 'bg-transparent'}`}></div>)}</div>
                                </div>
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center gap-2"><Coins size={14} className="text-yellow-400" /><span className="font-mono">{player.funds}</span></div>
                                    <div className="flex items-center gap-2"><Activity size={14} className="text-red-400" /><span className="font-mono">{player.morale}</span></div>
                                </div>
                            </div>

                            {/* Background */}
                            <div className="absolute inset-0 z-0">
                                {(() => {
                                    const bgSource = currentScene?.image || CHAPTERS[chapter].bgImage;
                                    return bgSource?.endsWith('.mp4') ? (
                                        <video src={bgSource} className="absolute inset-0 w-full h-full object-cover opacity-90" autoPlay playsInline />
                                    ) : (
                                        <img src={bgSource} className="absolute inset-0 w-full h-full object-cover opacity-90" onError={(e) => e.target.src = 'https://images.unsplash.com/photo-1542044806-25330e628830'} />
                                    );
                                })()}
                                <div className="absolute inset-0 bg-black/10"></div>
                            </div>

                            {/* Bottom Panel (Controls & Content) */}
                            <div className="fixed bottom-0 left-0 w-full h-[45vh] bg-gradient-to-t from-black via-black/95 to-transparent z-40 flex flex-col p-6 animate-fade-in">

                                {phase === 'GAME' && (
                                    <div className="flex-1 flex flex-col md:flex-row gap-4 h-full overflow-hidden">
                                        {/* Status Panel (Left) */}
                                        <div className="w-full md:w-1/3 bg-black/60 p-4 rounded-lg border border-white/10 backdrop-blur-md overflow-y-auto">
                                            <div className="mb-4 text-center">
                                                <div className="font-bold text-teal-400 text-xl font-cinzel mb-2">{player.name}</div>
                                                <div className="space-y-1">

                    }
                    {
                        phase === 'POST_CREDIT' && (
                            <PostCreditScene
                                endingType={endingType}
                                onComplete={() => window.location.reload()}
                            />
                        )
                    }

                    {
                        phase === 'QUIZ' && (
                            <div className="fixed inset-0 z-[9999] bg-black/95 flex items-center justify-center p-4">
                                <div className="bg-black/80 p-8 rounded-xl border border-teal-500/50 shadow-2xl backdrop-blur w-full max-w-2xl">
                                    <BingataQuiz onComplete={handleQuizComplete} />
                                </div>
                            </div>
                        )
                    }

                    {/* --- INVENTORY MODAL --- */}
                    {showInventory && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-black/80 backdrop-blur-md animate-fade-in p-4">
                            <div className="bg-gradient-to-b from-gray-900 to-black border border-teal-500/30 w-full max-w-4xl h-[80vh] rounded-xl shadow-2xl flex flex-col relative overflow-hidden">

                                {/* Header */}
                                <div className="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 rounded-full bg-teal-900/50 flex items-center justify-center border border-teal-500/50 text-2xl">🎒</div>
                                        <div>
                                            <h2 className="text-2xl font-cinzel text-teal-100 font-bold">INVENTORY</h2>
                                            <p className="text-xs text-gray-400">Total Items: {player.inventory.length}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowInventory(false)} className="text-gray-400 hover:text-white p-2 hover:bg-white/10 rounded-full transition-colors">
                                        <X size={24} />
                                    </button>
                                </div>

                                {/* Grid Content */}
                                <div className="flex-1 overflow-y-auto p-6 scrollbar-hide">
                                    {player.inventory.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-500 gap-4">
                                            <span className="text-6xl opacity-30">📦</span>
                                            <p>The bag is empty.</p>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                            {player.inventory.map((itemName, i) => {
                                                const item = ITEM_DB[itemName] || ITEM_DB['default'];
                                                return (
                                                    <button
                                                        key={i}
                                                        onClick={() => setViewingItem({ name: itemName, ...item })}
                                                        className="group bg-white/5 hover:bg-teal-900/20 border border-white/10 hover:border-teal-500/50 rounded-lg p-4 flex flex-col items-center gap-3 transition-all hover:-translate-y-1"
                                                    >
                                                        <div className="text-4xl filter drop-shadow-md group-hover:scale-110 transition-transform">{item.icon}</div>
                                                        <div className="text-sm text-gray-300 font-bold text-center group-hover:text-teal-200">{itemName}</div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>

                                {/* Footer */}
                                <div className="p-4 bg-black/40 border-t border-white/5 text-center text-xs text-gray-600 font-mono">
                                    RYUKYU KINGDOM COLLECTION
                                </div>

                                {/* --- ITEM DETAIL VIEW --- */}
                                {viewingItem && (
                                    <div className="absolute inset-0 z-[10020] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 animate-fade-in">
                                        <div className="w-full max-w-4xl h-full md:h-auto md:aspect-video bg-gray-900 rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row border border-white/10">

                                            {/* LEFT: Illustration Area */}
                                            <div className={`w-full md:w-1/2 h-1/2 md:h-full relative flex items-center justify-center p-8 overflow-hidden ${viewingItem.image ? 'bg-black' : `bg-gradient-to-br ${viewingItem.color || 'from-gray-700 to-gray-900'}`}`}>
                                                {viewingItem.image ? (
                                                    <img src={viewingItem.image} alt={viewingItem.name} className="absolute inset-0 w-full h-full object-cover opacity-90 hover:opacity-100 transition-opacity duration-500" />
                                                ) : (
                                                    <>
                                                        <div className="absolute w-[150%] h-[150%] bg-white/10 rounded-full blur-3xl -top-1/4 -left-1/4 animate-pulse"></div>
                                                        <div className="relative z-10 text-9xl md:text-[10rem] filter drop-shadow-2xl animate-bounce-subtle transform hover:scale-110 transition-transform duration-700 cursor-pointer">
                                                            {viewingItem.icon}
                                                        </div>
                                                        <div className="absolute inset-4 border border-white/20 rounded-xl pointer-events-none"></div>
                                                    </>
                                                )}
                                            </div>

                                            {/* RIGHT: Description Area */}
                                            <div className="w-full md:w-1/2 h-1/2 md:h-full bg-black/80 p-6 md:p-8 flex flex-col relative text-left">
                                                <button
                                                    onClick={() => setViewingItem(null)}
                                                    className="absolute top-4 right-4 text-gray-500 hover:text-white p-2 hover:bg-white/10 rounded-full transition-all z-20"
                                                >
                                                    <X size={24} />
                                                </button>

                                                <div className="mb-6 border-b border-gray-700 pb-4">
                                                    <div className="text-xs font-bold text-teal-500 mb-1 tracking-widest uppercase">
                                                        {viewingItem.type || 'ITEM'}
                                                    </div>
                                                    <h3 className="text-3xl md:text-4xl font-cinzel font-bold text-white drop-shadow-md">
                                                        {viewingItem.name}
                                                    </h3>
                                                </div>

                                                <div className="flex-1 overflow-y-auto pr-2 scrollbar-hide">
                                                    <p className="text-gray-300 font-myeongjo text-lg leading-loose whitespace-pre-line">
                                                        {viewingItem.desc}
                                                    </p>
                                                </div>

                                                <div className="mt-6 pt-4 border-t border-gray-800">
                                                    <button
                                                        onClick={() => setViewingItem(null)}
                                                        className="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-teal-500/30 rounded text-sm text-gray-400 hover:text-white transition-all tracking-widest uppercase"
                                                    >
                                                        Close Detail
                                                    </button>
                                                </div>
                                            </div>

                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div >
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<> <GlobalStyles /> <RyukyuGame /> </>);
    </script>
</body>

</html>
